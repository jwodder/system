---
- name: Restart fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: restarted

- name: Restart OpenDKIM
  ansible.builtin.service:
    name: opendkim
    state: restarted

- name: Rehash access file
  ansible.builtin.command: postmap hash:/etc/postfix/access

- name: Run newaliases
  ansible.builtin.command: newaliases

- name: Run postwhite
  ansible.builtin.command: /usr/local/postwhite/postwhite

- name: Restart Postfix
  ansible.builtin.service:
    name: postfix
    state: restarted
