---
- name: Install bin/maillog
  ansible.builtin.copy:
    src: bin/maillog
    dest: "{{ jwodder_root }}/bin/maillog"
    owner: "{{ admin_user }}"
    mode: "0755"

- name: Install /etc/procmailrc
  ansible.builtin.template:
    src: etc.procmailrc
    dest: /etc/procmailrc
    owner: root
    mode: "0644"
    backup: true

- name: Ensure maillog logfiles exist
  ensure_file:
    path: "{{ jwodder_root }}/logs/{{ item }}"
    owner: "{{ admin_user }}"
    mode: "0666"
  with_items:
    - fatal.email
    - maillog.err
    - procmail.err
