---
- name: Install essential software
  ansible.builtin.apt:
    name:
        - apt-transport-https
        - build-essential
        - curl
        - fail2ban
        - git
        - htop
        - jq
        - libpam-google-authenticator
        - moreutils  # chronic
        - patch
        - python3
        - python3-dev
        - python3-pip
        - python3-requests  # Required for `set_do_dns_record` module
        - python3-venv
        - software-properties-common  # apt-add-repository
        - tree
        - unattended-upgrades
        - unzip
        - ufw
        - wget
        - zip
    state: present
    update_cache: true

- name: Create swap space
  ansible.builtin.command: fallocate -l {{ansible_memtotal_mb * 2}}M /swapfile
  args:
    creates: /swapfile
  register: base_created_swap

- name: Create swapfile  # noqa: no-handler
  when: base_created_swap is changed
  block:
    - ansible.builtin.file:
        path: /swapfile
        mode: "0600"
    - ansible.builtin.command: mkswap /swapfile
      changed_when: true
    - ansible.builtin.lineinfile:
        dest: /etc/fstab
        line: "/swapfile none swap sw 0 0"
    - ansible.builtin.command: swapon /swapfile
      changed_when: true

#- name: Reset any changes made to ufw
#  community.general.ufw:
#    state: reset

- name: Deny all incoming connections
  community.general.ufw:
    policy: deny
    proto: any
    direction: incoming

- name: Allow incoming SSH connections
  community.general.ufw:
    rule: allow
    to_ip: any
    to_port: 22
    proto: any
    direction: in

- name: Enable ufw
  community.general.ufw:
    state: enabled

- name: Keep UFW messages from being logged to files other than ufw.log
  ansible.builtin.lineinfile:
    dest: /etc/rsyslog.d/20-ufw.conf
    regexp: '^\s*#?\s*&\s+(~|stop)\s*$'
    line: '& stop'
    insertafter: EOF
    backup: true
  notify:
    - Restart rsyslog

- name: Give some syslog facilities their own logfiles
  ansible.builtin.lineinfile:
    dest: /etc/rsyslog.d/50-default.conf
    regexp: '^#?{{item.key}}\s+{{item.value}}$'
    line: '{{item.key}} {{item.value}}'
    backup: true
  with_dict:
    "cron.*": /var/log/cron.log
    "user.*": -/var/log/user.log
  notify:
    - Restart rsyslog

- name: Deprive some syslog facilities of their own logfiles
  ansible.builtin.lineinfile:
    dest: /etc/rsyslog.d/50-default.conf
    regexp: '^({{item}}\s+.+)'
    line: '#\1'
    backup: true
    backrefs: true
  with_items:
    - mail.err
  notify:
    - Restart rsyslog

- name: Configure SSH
  ansible.builtin.copy:
    src: sshd.conf
    dest: /etc/ssh/sshd_config.d/99jwodder.conf
  notify:
    - Restart SSHd

- name: Enable Google Authenticator in PAM
  ansible.builtin.lineinfile:
    dest: /etc/pam.d/sshd
    line: 'auth required pam_google_authenticator.so'
    insertafter: EOF
  notify:
    - Restart SSHd

- name: Configure PAM to show the "Last login" and "Failed logins" messages
  ansible.builtin.lineinfile:
    dest: /etc/pam.d/sshd
    # Insert between the pam_env lines and the pam_selinux line
    insertafter: 'pam_env'
    line: "{{item}}"
    backup: true
  with_items:
    # Note that the lines will & must appear in the opposite order in the
    # configured file.
    - 'session optional    pam_lastlog.so silent noupdate showfailed'
    - 'session [default=1] pam_lastlog.so nowtmp showfailed'

- name: Disable cruft in login message
  ansible.builtin.file:
    ### TODO: This will fail when the file doesn't exist; fix this!
    path: "/etc/update-motd.d/{{item}}"
    mode: 0644
  with_items:
    - '00-header'
    - '10-help-text'

- name: Omit Landscape link from sysinfo in login message
  ansible.builtin.replace:
    dest: /etc/update-motd.d/50-landscape-sysinfo
    regexp: 'landscape-sysinfo(?! --exclude-sysinfo-plugins)'
    replace: 'landscape-sysinfo --exclude-sysinfo-plugins=LandscapeLink'
    backup: true

- name: Disable live news
  ansible.builtin.lineinfile:
    dest: /etc/default/motd-news
    regexp: '^\s*#?\s*ENABLED='
    line: 'ENABLED=0'

- name: Configure APT
  ansible.builtin.copy:
    src: apt.conf
    dest: /etc/apt/apt.conf.d/99jwodder

- name: Configure needrestart
  ansible.builtin.copy:
    src: needrestart.conf
    dest: /etc/needrestart/conf.d/99jwodder.conf

- name: Set timezone to UTC
  community.general.timezone:
    name: Etc/UTC

- name: Enable unattended upgrades
  ansible.builtin.debconf:
    name: unattended-upgrades
    question: unattended-upgrades/enable_auto_updates
    vtype: boolean
    value: true
  register: unattup

- name: Enable new unattended-upgrades settings
  ansible.builtin.command: dpkg-reconfigure -f noninteractive unattended-upgrades
  when: unattup is changed

- name: Configure fail2ban
  ansible.builtin.copy:
    src: "fail2ban/{{item}}"
    dest: "/etc/fail2ban/{{item}}"
    backup: true
  with_items:
    - fail2ban.d/dbpurgeage.local
    - jail.d/defaults.local
    - jail.d/recidive.local
    - jail.d/sshd.local
  notify:
    - Restart fail2ban

- name: Create journald.conf.d
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root

- name: Configure journald
  ansible.builtin.copy:
    src: journald.conf
    dest: /etc/systemd/journald.conf.d/jwodder.conf
    backup: true
  notify:
    - Restart journald
