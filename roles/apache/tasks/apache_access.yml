---
- name: Install bin/apache_access
  ansible.builtin.copy:
    src: bin/apache_access
    dest: "{{ jwodder_root }}/bin/apache_access"
    owner: "{{ admin_user }}"
    mode: "0755"
  notify:
    - Restart Apache

- name: Ensure apache_access errfile exists
  ensure_file:
    path: "{{ jwodder_root }}/logs/apache_access.err"
    owner: root
    mode: "0644"
